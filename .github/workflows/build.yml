name: Build Plugin

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run build
        run: bash build.sh

      - name: Verify committed plugin package is up to date
        run: |
          if ! git diff --quiet -- plugins/gluon-agent; then
            echo "Generated plugin package is out of date. Run 'bash build.sh' and commit the updated files under plugins/gluon-agent/."
            git diff -- plugins/gluon-agent
            exit 1
          fi

      - name: Upload Claude build artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-plugin
          path: dist/claude-plugin
          include-hidden-files: true

      - name: Upload Codex build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-plugin
          path: dist/codex-plugin
          include-hidden-files: true

      - name: Upload repo plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: gluon-agent-plugin
          path: plugins/gluon-agent
          include-hidden-files: true
